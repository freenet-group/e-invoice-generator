# IAM-Addendum für GitHub Actions Deploy-User (Lambda-Services allgemein)
#
# Dieses Snippet ist NICHT service-spezifisch – es gilt für alle Lambda-Services
# die mit Serverless Framework deployen und die default-lambda-boundary verwenden.
#
# Einbinden in billing-aws-account-iac:
#   In fndls.mcbs.3007520/account-setup/iam/github-action-base-role.yaml
#   unter dem vorhandenen Policies-Array:
#
#   Policies:
#     - PolicyName: existing-policy
#       ...
#     - PolicyName: serverless-lambda-deploy-iam-policy   ← neu (einmalig für alle Services)
#       PolicyDocument:
#         <Inhalt dieser Datei>
#
# Sicherheitskonzept:
#
#   Die Default-Boundary (default-lambda-boundary) wird von IaC verwaltet.
#   Deploy-User können sie NICHT ändern (kein iam:CreatePolicy darauf).
#   iam:CreateRole ist nur erlaubt wenn exakt diese Boundary gesetzt wird
#   → Privilege Escalation ist für alle Lambda-Service-Deploy-User ausgeschlossen.

Version: '2012-10-17'
Statement:
  # Lambda Execution Role erstellen/löschen – NUR mit der IaC-kontrollierten Default-Boundary
  - Sid: AllowRoleLifecycleWithDefaultBoundary
    Effect: Allow
    Action:
      - iam:CreateRole
      - iam:DeleteRole
      - iam:TagRole
      - iam:UntagRole
      - iam:UpdateAssumeRolePolicy
    Resource: '*'
    Condition:
      StringEquals:
        # Exakter ARN der Default-Boundary – kein Wildcard.
        # Deploy-User können die Boundary nicht selbst anlegen → Condition nicht umgehbar.
        iam:PermissionsBoundary: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/default-lambda-boundary'

  # Role-Policies verwalten (Serverless aktualisiert Inline-Policies bei jedem Deploy)
  - Sid: AllowRolePolicyManagement
    Effect: Allow
    Action:
      - iam:PutRolePolicy
      - iam:DeleteRolePolicy
      - iam:AttachRolePolicy
      - iam:DetachRolePolicy
      - iam:GetRole
      - iam:GetRolePolicy
      - iam:ListRolePolicies
      - iam:ListAttachedRolePolicies
      - iam:UpdateRoleDescription
    Resource: '*'

  # PassRole: CloudFormation benötigt dies, um die Rolle Lambda zuzuweisen
  - Sid: AllowPassRoleToLambda
    Effect: Allow
    Action:
      - iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: lambda.amazonaws.com

  # Boundary-ARN aus SSM lesen (für serverless package/deploy)
  - Sid: AllowReadSharedBoundaryParameter
    Effect: Allow
    Action:
      - ssm:GetParameter
    Resource:
      - arn:aws:ssm:${aws:region}:${aws:accountId}:parameter/shared/lambda-boundary-arn

  # BEWUSST NICHT ENTHALTEN:
  #   iam:CreatePolicy / iam:PutManagedPolicy auf default-lambda-boundary
  #   → Die Boundary kann nur von IaC (Admin-Rolle) geändert werden
