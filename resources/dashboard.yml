Type: AWS::CloudWatch::Dashboard
Properties:
  DashboardName: ${self:service}-${self:provider.stage}
  DashboardBody: !Sub |
    {
      "widgets": [
        {
          "type": "alarm", "x": 0, "y": 0, "width": 24, "height": 2,
          "properties": {
            "title": "Alarm Status",
            "alarms": [
              "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${self:service}-lambda-errors-${self:provider.stage}",
              "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${self:service}-dlq-messages-${self:provider.stage}",
              "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${self:service}-fatal-dlq-messages-${self:provider.stage}"
            ]
          }
        },
        {
          "type": "metric", "x": 0, "y": 2, "width": 8, "height": 6,
          "properties": {
            "title": "Lambda Invocations & Errors",
            "metrics": [
              ["AWS/Lambda", "Invocations", "FunctionName", "e-invoice-generator-${self:provider.stage}-createEInvoice", {"stat": "Sum", "label": "Invocations"}],
              ["AWS/Lambda", "Errors",       "FunctionName", "e-invoice-generator-${self:provider.stage}-createEInvoice", {"stat": "Sum", "label": "Errors", "color": "#d62728"}]
            ],
            "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
          }
        },
        {
          "type": "metric", "x": 8, "y": 2, "width": 8, "height": 6,
          "properties": {
            "title": "Lambda Duration (ms)",
            "metrics": [
              ["AWS/Lambda", "Duration", "FunctionName", "e-invoice-generator-${self:provider.stage}-createEInvoice", {"stat": "p50", "label": "p50"}],
              ["AWS/Lambda", "Duration", "FunctionName", "e-invoice-generator-${self:provider.stage}-createEInvoice", {"stat": "p99", "label": "p99", "color": "#ff7f0e"}]
            ],
            "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
          }
        },
        {
          "type": "metric", "x": 16, "y": 2, "width": 8, "height": 6,
          "properties": {
            "title": "SQS Queue – Messages",
            "metrics": [
              ["AWS/SQS", "NumberOfMessagesSent",     "QueueName", "mcbs-invoice-processing-${self:provider.stage}", {"stat": "Sum", "label": "Sent"}],
              ["AWS/SQS", "NumberOfMessagesDeleted",  "QueueName", "mcbs-invoice-processing-${self:provider.stage}", {"stat": "Sum", "label": "Deleted"}],
              ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "mcbs-invoice-processing-${self:provider.stage}", {"stat": "Maximum", "label": "Visible"}]
            ],
            "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
          }
        },
        {
          "type": "metric", "x": 0, "y": 8, "width": 8, "height": 6,
          "properties": {
            "title": "DLQ – Messages (sollte 0 sein)",
            "metrics": [
              ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "mcbs-invoice-processing-dlq-${self:provider.stage}", {"stat": "Maximum", "label": "DLQ Visible", "color": "#d62728"}],
              ["AWS/SQS", "NumberOfMessagesSent", "QueueName", "mcbs-invoice-processing-dlq-${self:provider.stage}", {"stat": "Sum", "label": "DLQ Sent", "color": "#ff7f0e"}]
            ],
            "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
          }
        },
        {
          "type": "metric", "x": 8, "y": 8, "width": 8, "height": 6,
          "properties": {
            "title": "DLQ Processor – Invocations & Errors",
            "metrics": [
              ["AWS/Lambda", "Invocations", "FunctionName", "e-invoice-generator-${self:provider.stage}-processDLQ", {"stat": "Sum", "label": "Invocations"}],
              ["AWS/Lambda", "Errors",       "FunctionName", "e-invoice-generator-${self:provider.stage}-processDLQ", {"stat": "Sum", "label": "Errors", "color": "#d62728"}]
            ],
            "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
          }
        },
        {
          "type": "metric", "x": 16, "y": 8, "width": 8, "height": 6,
          "properties": {
            "title": "Lambda Throttles",
            "metrics": [
              ["AWS/Lambda", "Throttles", "FunctionName", "e-invoice-generator-${self:provider.stage}-createEInvoice",   {"stat": "Sum", "label": "createEInvoice", "color": "#ff7f0e"}],
              ["AWS/Lambda", "Throttles", "FunctionName", "e-invoice-generator-${self:provider.stage}-processDLQ",      {"stat": "Sum", "label": "processDLQ"}],
              ["AWS/Lambda", "Throttles", "FunctionName", "e-invoice-generator-${self:provider.stage}-processFatalDLQ", {"stat": "Sum", "label": "processFatalDLQ", "color": "#9467bd"}]
            ],
            "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
          }
        },
        {
          "type": "metric", "x": 0, "y": 14, "width": 8, "height": 6,
          "properties": {
            "title": "Fatal DLQ – Messages (Dev-Team Eingriff erforderlich)",
            "metrics": [
              ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "mcbs-invoice-processing-fatal-dlq-${self:provider.stage}", {"stat": "Maximum", "label": "Fatal DLQ Visible", "color": "#9467bd"}],
              ["AWS/SQS", "NumberOfMessagesSent",              "QueueName", "mcbs-invoice-processing-fatal-dlq-${self:provider.stage}", {"stat": "Sum",     "label": "Fatal DLQ Sent",    "color": "#d62728"}]
            ],
            "period": 300, "view": "timeSeries", "region": "${AWS::Region}",
            "annotations": {
              "horizontal": [{"label": "Kein Wert erwartet", "value": 1, "color": "#d62728", "fill": "above"}]
            }
          }
        },
        {
          "type": "metric", "x": 8, "y": 14, "width": 8, "height": 6,
          "properties": {
            "title": "Fatal DLQ Processor – Invocations & Errors",
            "metrics": [
              ["AWS/Lambda", "Invocations", "FunctionName", "e-invoice-generator-${self:provider.stage}-processFatalDLQ", {"stat": "Sum", "label": "Invocations"}],
              ["AWS/Lambda", "Errors",       "FunctionName", "e-invoice-generator-${self:provider.stage}-processFatalDLQ", {"stat": "Sum", "label": "Errors", "color": "#d62728"}]
            ],
            "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
          }
        },
        {
          "type": "metric", "x": 16, "y": 14, "width": 8, "height": 6,
          "properties": {
            "title": "Fatal DLQ vs. DLQ – Fehler-Typen im Vergleich",
            "metrics": [
              ["AWS/SQS", "NumberOfMessagesSent", "QueueName", "mcbs-invoice-processing-dlq-${self:provider.stage}",       {"stat": "Sum", "label": "DLQ (transient)",     "color": "#ff7f0e"}],
              ["AWS/SQS", "NumberOfMessagesSent", "QueueName", "mcbs-invoice-processing-fatal-dlq-${self:provider.stage}", {"stat": "Sum", "label": "Fatal DLQ (deterministisch)", "color": "#d62728"}]
            ],
            "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
          }
        },
        {
          "type": "metric", "x": 0, "y": 20, "width": 12, "height": 6,
          "properties": {
            "title": "SNS Output – Published Messages (sollte = SQS Visible sein)",
            "metrics": [
              ["AWS/SNS", "NumberOfMessagesSent",        "TopicName", "${self:service}-einvoice-created-${self:provider.stage}", {"stat": "Sum", "label": "Sent"}],
              ["AWS/SNS", "NumberOfNotificationsFailed", "TopicName", "${self:service}-einvoice-created-${self:provider.stage}", {"stat": "Sum", "label": "Failed", "color": "#d62728"}]
            ],
            "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
          }
        },
        {
          "type": "metric", "x": 12, "y": 20, "width": 12, "height": 6,
          "properties": {
            "title": "SNS vs. Lambda – Verhältnis (bei batchSize=10: SNS ≈ 10× Invocations erwartet)",
            "metrics": [
              ["AWS/Lambda", "Invocations", "FunctionName", "e-invoice-generator-${self:provider.stage}-createEInvoice", {"stat": "Sum", "label": "Lambda Invocations"}],
              ["AWS/SNS",    "NumberOfMessagesSent", "TopicName", "${self:service}-einvoice-created-${self:provider.stage}", {"stat": "Sum", "label": "SNS Sent", "color": "#ff7f0e"}]
            ],
            "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
          }
        }
      ]
    }

