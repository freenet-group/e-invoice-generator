service: e-invoice-generator

frameworkVersion: '4'
licenseKey: '${ssm:SERVERLESS_LICENSE_KEY}'

provider:
  name: aws
  architecture: arm64
  runtime: nodejs22.x
  region: eu-central-1
  stage: ${opt:stage, 'dev'}
  stackTags: {} # Keine Stack-Tags → verhindert iam:TagRole auf Stack-Ebene

  # Lambda Defaults
  memorySize: 2048 # 2 GB
  timeout: 60 # 60 Sekunden

  # Environment Variables
  environment:
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1
    SERVICE_NAME: ${self:service}
    DLQ_QUEUE_URL: !Ref InvoiceProcessingDLQ
    BUCKET_NAME: ${self:custom.bucketName}
    XML_PREFIX: ${self:custom.prefixes.xml}
    PDF_PREFIX: ${self:custom.prefixes.pdf}
    OUTPUT_PREFIX: ${self:custom.prefixes.output}
    STAGE: ${self:provider.stage}
    ACTIVE_ADAPTER: ${self:custom.stages.${self:provider.stage}.activeAdapter, self:custom.defaults.activeAdapter}
    E_INVOICE_PROFILE: ${self:custom.stages.${self:provider.stage}.eInvoiceProfile, self:custom.defaults.eInvoiceProfile}
    ALERT_TOPIC_ARN: !Ref AlertTopic
    E_INVOICE_TOPIC_ARN: !Ref EInvoiceCreatedTopic
    FATAL_DLQ_URL: !Ref InvoiceProcessingFatalDLQ

  # IAM: Lambda-Rolle wird als CloudFormation-Ressource definiert (LambdaExecutionRole).
  # Alle notwendigen Berechtigungen und die Permission Boundary sind dort deklariert.
  iam:
    role: !GetAtt LambdaExecutionRole.Arn

# Lambda Functions
functions:
  # Main Function: Unified E-Invoice Processor (Multi-Source)
  createEInvoice:
    handler: src/handlers/unifiedEInvoiceProcessor.handler
    description: Creates E-Invoices from MCBS (Legacy) or AWS Billing Service
    memorySize: 2048
    timeout: 60
    reservedConcurrency: 100 # Max 100 parallel executions

    events:
      # SQS Queue Trigger (Batching!)
      - sqs:
          arn: !GetAtt InvoiceProcessingQueue.Arn
          batchSize: 10 # ← Process 10 messages at once (90% cost savings!)
          functionResponseType: ReportBatchItemFailures # Partial batch failures

  # DLQ Processor (Alerting bei fehlgeschlagenen Nachrichten nach maxReceiveCount Retries)
  processDLQ:
    handler: src/handlers/dlqProcessor.handler
    description: Processes DLQ messages - logs details and sends SNS alerts
    memorySize: 512
    timeout: 30

    events:
      - sqs:
          arn: !GetAtt InvoiceProcessingDLQ.Arn
          batchSize: 1
          functionResponseType: ReportBatchItemFailures

    environment:
      ALERT_TOPIC_ARN: !Ref AlertTopic

  # Fatal DLQ Processor (Alerting bei deterministischen Fehlern – kein Retry möglich)
  processFatalDLQ:
    handler: src/handlers/fatalDlqProcessor.handler
    description: Processes Fatal DLQ messages - logs fatal errors and alerts Dev-Team
    memorySize: 512
    timeout: 30

    events:
      - sqs:
          arn: !GetAtt InvoiceProcessingFatalDLQ.Arn
          batchSize: 1
          functionResponseType: ReportBatchItemFailures

    environment:
      ALERT_TOPIC_ARN: !Ref AlertTopic

# AWS Resources
resources:
  Conditions:
    # Bucket nur in Stages anlegen, die ihn selbst verwalten (dev / persönliche Stages).
    # staging + production: Bucket wird außerhalb über IaC (Terraform/CDK) bereitgestellt.
    CreateBucket: !Equals
      - '${self:custom.stages.${self:provider.stage}.createBucket, self:custom.stages.dev.createBucket}'
      - 'true'

    # Permission Boundary nur setzen wenn der SSM-Parameter vorhanden ist.
    HasPermissionBoundary: !Not
      - !Equals
        - '${self:custom.lambdaBoundaryArn}'
        - ''

  Resources:
    # ==================== S3 Buckets ====================

    # MCBS Invoices Bucket (nur in Stages mit createBucket: true)
    McbsInvoicesBucket:
      Type: AWS::S3::Bucket
      Condition: CreateBucket
      DependsOn:
        - InvoiceProcessingQueuePolicy
      Properties:
        BucketName: ${self:custom.bucketName}
        VersioningConfiguration:
          Status: Enabled

        # Lifecycle Rules
        LifecycleConfiguration:
          Rules:
            # Move old e-invoices to Glacier after 30 days
            - Id: MoveToGlacierAfter30Days
              Status: Enabled
              Prefix: e-invoices/
              Transitions:
                - TransitionInDays: 30
                  StorageClass: GLACIER

            # Delete raw XML after 90 days
            - Id: DeleteRawXMLAfter90Days
              Status: Enabled
              Prefix: raw/
              ExpirationInDays: 90

        # EventBridge Integration (S3 → EventBridge)
        NotificationConfiguration:
          EventBridgeConfiguration:
            EventBridgeEnabled: true # ← Enable S3 → EventBridge

        # Encryption
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256

        # Public Access Block
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

        # Tags
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # ==================== EventBridge Rules ====================

    # EventBridge Rule: S3 Events → SQS (MCBS Legacy)
    S3EventsToSQSRule:
      Type: AWS::Events::Rule
      Properties:
        Name: mcbs-invoice-s3-events-to-sqs-${self:provider.stage}
        Description: Routes S3 Object Created events to SQS for batching
        EventBusName: default
        State: ${self:custom.stages.${self:provider.stage}.s3RuleState, self:custom.defaults.s3RuleState}

        # Pattern: S3 Object Created in mcbs-invoices bucket
        EventPattern:
          source:
            - aws.s3
          detail-type:
            - Object Created
          detail:
            bucket:
              name:
                - ${self:custom.bucketName}
            object:
              key:
                - wildcard: '${self:custom.prefixes.pdf}*.pdf'

        # Target: SQS Queue (for batching)
        Targets:
          - Arn: !GetAtt InvoiceProcessingQueue.Arn
            Id: SQSBatchingTarget

    # Eine Rule — aktiver Adapter bestimmt das Pattern (vorbereitet für zweiten Adapter)
    ActiveAdapterRule:
      Type: AWS::Events::Rule
      Properties:
        Name: active-adapter-rule-${self:provider.stage}
        State: ${self:custom.stages.${self:provider.stage}.activeRuleState, self:custom.defaults.activeRuleState}
        EventPattern:
          source:
            - ${self:custom.stages.${self:provider.stage}.eventSource, self:custom.defaults.eventSource}
          detail-type:
            - ${self:custom.stages.${self:provider.stage}.eventDetailType, self:custom.defaults.eventDetailType}
        Targets:
          - Arn: !GetAtt InvoiceProcessingQueue.Arn
            Id: SQSBatchingTarget

    # ==================== SQS Queues ====================

    # Main Processing Queue (Batching Layer)
    InvoiceProcessingQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: mcbs-invoice-processing-${self:provider.stage}
        VisibilityTimeout: 360 # 6 Minutes (Lambda timeout × 6)
        MessageRetentionPeriod: 1209600 # 14 Days
        ReceiveMessageWaitTimeSeconds: 20 # Long Polling (reduces empty receives)

        # Dead Letter Queue Configuration
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt InvoiceProcessingDLQ.Arn
          maxReceiveCount: 3 # After 3 failed attempts → DLQ

        # Tags
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}
          - Key: Purpose
            Value: Batching

    # Dead Letter Queue (für fehlgeschlagene Messages nach maxReceiveCount Retries)
    InvoiceProcessingDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: mcbs-invoice-processing-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600 # 14 Days

        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}
          - Key: Type
            Value: DeadLetterQueue

    # Fatal Dead Letter Queue (für deterministische Fehler – kein Retry sinnvoll)
    InvoiceProcessingFatalDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: mcbs-invoice-processing-fatal-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600 # 14 Days

        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}
          - Key: Type
            Value: FatalDeadLetterQueue

    # ==================== CloudWatch Dashboard ====================

    EInvoiceDashboard: ${file(resources/dashboard.yml)}

    # ==================== SSM Parameter ====================

    # SSM Parameter nur in Stages anlegen, die den Bucket selbst verwalten (dev / persönliche Stages).
    # staging + production: Parameter werden außerhalb zusammen mit dem S3 Bucket über IaC bereitgestellt.
    BucketNameParameter:
      Type: AWS::SSM::Parameter
      Condition: CreateBucket
      Properties:
        Name: /mcbs-invoices/${self:provider.stage}/bucket
        Value: ${self:custom.bucketName}
        Type: String
        Description: S3 Bucket Name für MCBS-Rechnungen (Stage ${self:provider.stage})

    XmlPrefixParameter:
      Type: AWS::SSM::Parameter
      Condition: CreateBucket
      Properties:
        Name: /mcbs-invoices/${self:provider.stage}/mcbs-invoice-xml-prefix
        Value: ${self:custom.prefixes.xml}
        Type: String
        Description: S3-Prefix für eingehende MCBS-XML-Rechnungen

    PdfPrefixParameter:
      Type: AWS::SSM::Parameter
      Condition: CreateBucket
      Properties:
        Name: /mcbs-invoices/${self:provider.stage}/mcbs-invoice-pdf-prefix
        Value: ${self:custom.prefixes.pdf}
        Type: String
        Description: S3-Prefix für eingehende Kunden-PDFs

    OutputPrefixParameter:
      Type: AWS::SSM::Parameter
      Condition: CreateBucket
      Properties:
        Name: /mcbs-invoices/${self:provider.stage}/mcbs-invoice-output-prefix
        Value: ${self:custom.prefixes.output}
        Type: String
        Description: S3-Prefix für generierte ZUGFeRD-E-Rechnungen

    # ==================== IAM ====================

    LambdaExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:service}-lambda-role-${self:provider.stage}
        PermissionsBoundary: !If
          - HasPermissionBoundary
          - '${self:custom.lambdaBoundaryArn}'
          - !Ref AWS::NoValue
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          # CloudWatch Logs (CreateLogGroup, CreateLogStream, PutLogEvents)
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          - PolicyName: EInvoiceGeneratorPolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                # SNS: E-Invoice-Events + DLQ-Alerts publizieren
                - Effect: Allow
                  Action: sns:Publish
                  Resource:
                    - !Ref EInvoiceCreatedTopic
                    - !Ref AlertTopic
                # S3: MCBS-XML/PDF lesen, ZUGFeRD-E-Rechnungen schreiben
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:PutObject
                  Resource: 'arn:aws:s3:::${self:custom.bucketName}/*'
                - Effect: Allow
                  Action:
                    - s3:ListBucket
                  Resource: 'arn:aws:s3:::${self:custom.bucketName}'
                # SQS: Messages aus Processing Queue und DLQ verarbeiten
                - Effect: Allow
                  Action:
                    - sqs:ReceiveMessage
                    - sqs:DeleteMessage
                    - sqs:GetQueueAttributes
                    - sqs:ChangeMessageVisibility
                  Resource:
                    - !GetAtt InvoiceProcessingQueue.Arn
                    - !GetAtt InvoiceProcessingDLQ.Arn
                    - !GetAtt InvoiceProcessingFatalDLQ.Arn
                # SQS: Nachrichten direkt an Fatal DLQ senden (deterministischer Fehler)
                - Effect: Allow
                  Action:
                    - sqs:SendMessage
                  Resource:
                    - !GetAtt InvoiceProcessingFatalDLQ.Arn

    # ==================== SNS ====================

    # Notification Topic: wird nach erfolgreicher E-Rechnungs-Generierung publiziert
    EInvoiceCreatedTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-einvoice-created-${self:provider.stage}
        DisplayName: E-Invoice Created Notifications
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # Alert Topic für DLQ-Fehler und Lambda-Errors
    AlertTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-alerts-${self:provider.stage}
        DisplayName: E-Invoice Alert Notifications
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # SQS Queue Policy (allows EventBridge to send messages)
    InvoiceProcessingQueuePolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        Queues:
          - !Ref InvoiceProcessingQueue
        PolicyDocument:
          Statement:
            # Allow EventBridge to send messages
            - Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action:
                - sqs:SendMessage
              Resource: !GetAtt InvoiceProcessingQueue.Arn
              Condition:
                ArnEquals:
                  aws:SourceArn:
                    - !GetAtt S3EventsToSQSRule.Arn
                    - !GetAtt ActiveAdapterRule.Arn

  Outputs:
    S3BucketName:
      Condition: CreateBucket
      Description: S3 Bucket for MCBS Invoices (nur wenn vom Stack erstellt)
      Value: !Ref McbsInvoicesBucket
      Export:
        Name: ${self:service}-${self:provider.stage}-mcbs-invoices-bucket

    SQSQueueURL:
      Description: SQS Queue URL for Invoice Processing (Batching Layer)
      Value: !Ref InvoiceProcessingQueue
      Export:
        Name: ${self:service}-${self:provider.stage}-invoice-queue-url

    SQSQueueARN:
      Description: SQS Queue ARN
      Value: !GetAtt InvoiceProcessingQueue.Arn
      Export:
        Name: ${self:service}-${self:provider.stage}-invoice-queue-arn

    DLQQueueURL:
      Description: Dead Letter Queue URL
      Value: !Ref InvoiceProcessingDLQ
      Export:
        Name: ${self:service}-${self:provider.stage}-invoice-dlq-url

    FatalDLQQueueURL:
      Description: Fatal Dead Letter Queue URL (deterministische Fehler – kein Retry)
      Value: !Ref InvoiceProcessingFatalDLQ
      Export:
        Name: ${self:service}-${self:provider.stage}-invoice-fatal-dlq-url

    FatalDLQQueueARN:
      Description: Fatal Dead Letter Queue ARN
      Value: !GetAtt InvoiceProcessingFatalDLQ.Arn
      Export:
        Name: ${self:service}-${self:provider.stage}-invoice-fatal-dlq-arn

    LambdaFunctionARN:
      Description: Lambda Function ARN (Unified E-Invoice Processor)
      Value: !GetAtt CreateEInvoiceLambdaFunction.Arn
      Export:
        Name: ${self:service}-${self:provider.stage}-create-einvoice-lambda

    EInvoiceCreatedTopicARN:
      Description: SNS Topic ARN for E-Invoice Created events
      Value: !Ref EInvoiceCreatedTopic
      Export:
        Name: ${self:service}-${self:provider.stage}-einvoice-created-topic

    AlertTopicARN:
      Description: SNS Topic for Alerts
      Value: !Ref AlertTopic
      Export:
        Name: ${self:service}-${self:provider.stage}-alert-topic

    LambdaExecutionRoleARN:
      Description: IAM Role ARN for Lambda functions
      Value: !GetAtt LambdaExecutionRole.Arn
      Export:
        Name: ${self:service}-${self:provider.stage}-lambda-role-arn

    DashboardURL:
      Description: CloudWatch Dashboard URL
      Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${self:service}-${self:provider.stage}'
      Export:
        Name: ${self:service}-${self:provider.stage}-dashboard-url

# Plugins
plugins:
  - serverless-offline

# Build Configuration (Serverless Framework v4 built-in esbuild)
build:
  esbuild:
    bundle: true
    minify: true
    sourcemap: true
    target: node22
    platform: node
    external:
      - '@aws-sdk/*'

# Custom Configuration
custom:
  # Permission Boundary (optional) – wird nur gesetzt wenn der SSM-Parameter existiert
  lambdaBoundaryArn: ${ssm:/shared/lambda-boundary-arn, ''}

  # Ein Bucket – Artefakte werden über Präfixe getrennt
  bucketName: mcbs-invoices-${self:provider.stage}

  # S3-Präfixe je Artefakttyp
  prefixes:
    xml: 'raw/xml/' # Eingehende MCBS-XML
    pdf: 'raw/pdf/' # Eingehende Kunden-PDFs
    output: 'e-invoices/' # Generierte ZUGFeRD-E-Rechnungen

  # Standardwerte – gelten für alle Stages, sofern nicht unten überschrieben
  defaults:
    logLevel: info
    eInvoiceProfile: factur-x-en16931
    activeAdapter: custom.mcbs
    lambdaMemory: 2048
    lambdaTimeout: 60
    batchSize: 10
    maxBatchingWindow: 5
    s3RuleState: ENABLED
    activeRuleState: DISABLED
    eventSource: custom.mcbs
    eventDetailType: Object Created
    createBucket: 'false' # Bucket extern verwaltet (IaC)

  # Stage-spezifische Abweichungen von den Defaults
  stages:
    dev:
      logLevel: debug
      createBucket: 'true' # Bucket wird vom Stack erstellt

    git:
      createBucket: 'false'

    test:
      createBucket: 'false'

    regtest:
      createBucket: 'false'

    prod:
      logLevel: warn
      reservedConcurrency: 200
      createBucket: 'false'

# Package Configuration
package:
  individually: true
  patterns:
    - '!.git/**'
    - '!.github/**'
    - '!test/**'
    - '!coverage/**'
    - '!docs/**'
    - '!*.md'
    - '!node_modules/aws-sdk/**' # Already in Lambda runtime
