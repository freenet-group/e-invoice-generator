service: e-invoice-generator

frameworkVersion: '4'

provider:
  name: aws
  architecture: arm64
  runtime: nodejs22.x
  region: eu-central-1
  stage: ${opt:stage, 'dev'}
  stackTags: {} # Verhindert iam:TagRole (AWSPowerUserAccess hat keine Tag-Rechte auf IAM)

  # Lambda Defaults
  memorySize: 2048 # 2 GB
  timeout: 60 # 60 Sekunden

  # Environment Variables
  environment:
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1
    DLQ_QUEUE_URL: !Ref InvoiceProcessingDLQ
    BUCKET_NAME: ${self:custom.bucketName}
    XML_PREFIX: ${self:custom.prefixes.xml}
    PDF_PREFIX: ${self:custom.prefixes.pdf}
    OUTPUT_PREFIX: ${self:custom.prefixes.output}
    STAGE: ${self:provider.stage}
    ACTIVE_ADAPTER: ${self:custom.stages.${self:provider.stage}.activeAdapter, self:custom.stages.dev.activeAdapter}
    E_INVOICE_PROFILE: ${self:custom.stages.${self:provider.stage}.eInvoiceProfile, self:custom.stages.dev.eInvoiceProfile}
    ALERT_TOPIC_ARN: !Ref AlertTopic

  # IAM: Vorhandene Rolle verwenden → verhindert iam:TagRole-Fehler (AWSPowerUserAccess)
  iam:
    role: arn:aws:iam::${aws:accountId}:role/e-invoice-generator-lambda-role

# Lambda Functions
functions:
  # Main Function: Unified E-Invoice Processor (Multi-Source)
  createEInvoice:
    handler: src/handlers/unifiedEInvoiceProcessor.handler
    description: Creates E-Invoices from MCBS (Legacy) or AWS Billing Service
    memorySize: 2048
    timeout: 60
    reservedConcurrency: 100 # Max 100 parallel executions

    events:
      # SQS Queue Trigger (Batching!)
      - sqs:
          arn: !GetAtt InvoiceProcessingQueue.Arn
          batchSize: 10 # ← Process 10 messages at once (90% cost savings!)
          functionResponseType: ReportBatchItemFailures # Partial batch failures

  # DLQ Processor (Alerting bei fehlgeschlagenen Nachrichten)
  processDLQ:
    handler: src/handlers/dlqProcessor.handler
    description: Processes DLQ messages - logs details and sends SNS alerts
    memorySize: 512
    timeout: 30

    events:
      - sqs:
          arn: !GetAtt InvoiceProcessingDLQ.Arn
          batchSize: 1
          functionResponseType: ReportBatchItemFailures

    environment:
      ALERT_TOPIC_ARN: !Ref AlertTopic

# AWS Resources
resources:
  Conditions:
    # Bucket nur in Stages anlegen, die ihn selbst verwalten (dev / persönliche Stages).
    # staging + production: Bucket wird außerhalb über IaC (Terraform/CDK) bereitgestellt.
    CreateBucket: !Equals
      - '${self:custom.stages.${self:provider.stage}.createBucket, self:custom.stages.dev.createBucket}'
      - 'true'

  Resources:
    # ==================== S3 Buckets ====================

    # MCBS Invoices Bucket (nur in Stages mit createBucket: true)
    McbsInvoicesBucket:
      Type: AWS::S3::Bucket
      Condition: CreateBucket
      DependsOn:
        - InvoiceProcessingQueuePolicy
      Properties:
        BucketName: ${self:custom.bucketName}
        VersioningConfiguration:
          Status: Enabled

        # Lifecycle Rules
        LifecycleConfiguration:
          Rules:
            # Move old e-invoices to Glacier after 30 days
            - Id: MoveToGlacierAfter30Days
              Status: Enabled
              Prefix: e-invoices/
              Transitions:
                - TransitionInDays: 30
                  StorageClass: GLACIER

            # Delete raw XML after 90 days
            - Id: DeleteRawXMLAfter90Days
              Status: Enabled
              Prefix: raw/
              ExpirationInDays: 90

        # EventBridge Integration (S3 → EventBridge)
        NotificationConfiguration:
          EventBridgeConfiguration:
            EventBridgeEnabled: true # ← Enable S3 → EventBridge

        # Encryption
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256

        # Public Access Block
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

        # Tags
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # ==================== EventBridge Rules ====================

    # EventBridge Rule: S3 Events → SQS (MCBS Legacy)
    S3EventsToSQSRule:
      Type: AWS::Events::Rule
      Properties:
        Name: mcbs-invoice-s3-events-to-sqs-${self:provider.stage}
        Description: Routes S3 Object Created events to SQS for batching
        EventBusName: default
        State: ${self:custom.stages.${self:provider.stage}.s3RuleState, self:custom.stages.dev.s3RuleState}

        # Pattern: S3 Object Created in mcbs-invoices bucket
        EventPattern:
          source:
            - aws.s3
          detail-type:
            - Object Created
          detail:
            bucket:
              name:
                - ${self:custom.bucketName}
            object:
              key:
                - wildcard: '${self:custom.prefixes.pdf}*.pdf'

        # Target: SQS Queue (for batching)
        Targets:
          - Arn: !GetAtt InvoiceProcessingQueue.Arn
            Id: SQSBatchingTarget

    # Eine Rule — aktiver Adapter bestimmt das Pattern (vorbereitet für zweiten Adapter)
    ActiveAdapterRule:
      Type: AWS::Events::Rule
      Properties:
        Name: active-adapter-rule-${self:provider.stage}
        State: ${self:custom.stages.${self:provider.stage}.activeRuleState, self:custom.stages.dev.activeRuleState}
        EventPattern:
          source:
            - ${self:custom.stages.${self:provider.stage}.eventSource, self:custom.stages.dev.eventSource}
          detail-type:
            - ${self:custom.stages.${self:provider.stage}.eventDetailType, self:custom.stages.dev.eventDetailType}
        Targets:
          - Arn: !GetAtt InvoiceProcessingQueue.Arn
            Id: SQSBatchingTarget

    # ==================== SQS Queues ====================

    # Main Processing Queue (Batching Layer)
    InvoiceProcessingQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: mcbs-invoice-processing-${self:provider.stage}
        VisibilityTimeout: 360 # 6 Minutes (Lambda timeout × 6)
        MessageRetentionPeriod: 1209600 # 14 Days
        ReceiveMessageWaitTimeSeconds: 20 # Long Polling (reduces empty receives)

        # Dead Letter Queue Configuration
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt InvoiceProcessingDLQ.Arn
          maxReceiveCount: 3 # After 3 failed attempts → DLQ

        # Tags
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}
          - Key: Purpose
            Value: Batching

    # Dead Letter Queue (für fehlgeschlagene Messages)
    InvoiceProcessingDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: mcbs-invoice-processing-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600 # 14 Days

        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}
          - Key: Type
            Value: DeadLetterQueue

    # ==================== CloudWatch Dashboard ====================

    EInvoiceDashboard:
      Type: AWS::CloudWatch::Dashboard
      Properties:
        DashboardName: ${self:service}-${self:provider.stage}
        DashboardBody: !Sub |
          {
            "widgets": [
              {
                "type": "metric", "x": 0, "y": 0, "width": 8, "height": 6,
                "properties": {
                  "title": "Lambda Invocations & Errors",
                  "metrics": [
                    ["AWS/Lambda", "Invocations", "FunctionName", "e-invoice-generator-${self:provider.stage}-createEInvoice", {"stat": "Sum", "label": "Invocations"}],
                    ["AWS/Lambda", "Errors",       "FunctionName", "e-invoice-generator-${self:provider.stage}-createEInvoice", {"stat": "Sum", "label": "Errors", "color": "#d62728"}]
                  ],
                  "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
                }
              },
              {
                "type": "metric", "x": 8, "y": 0, "width": 8, "height": 6,
                "properties": {
                  "title": "Lambda Duration (ms)",
                  "metrics": [
                    ["AWS/Lambda", "Duration", "FunctionName", "e-invoice-generator-${self:provider.stage}-createEInvoice", {"stat": "p50", "label": "p50"}],
                    ["AWS/Lambda", "Duration", "FunctionName", "e-invoice-generator-${self:provider.stage}-createEInvoice", {"stat": "p99", "label": "p99", "color": "#ff7f0e"}]
                  ],
                  "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
                }
              },
              {
                "type": "metric", "x": 16, "y": 0, "width": 8, "height": 6,
                "properties": {
                  "title": "SQS Queue – Messages",
                  "metrics": [
                    ["AWS/SQS", "NumberOfMessagesSent",     "QueueName", "mcbs-invoice-processing-${self:provider.stage}", {"stat": "Sum", "label": "Sent"}],
                    ["AWS/SQS", "NumberOfMessagesDeleted",  "QueueName", "mcbs-invoice-processing-${self:provider.stage}", {"stat": "Sum", "label": "Deleted"}],
                    ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "mcbs-invoice-processing-${self:provider.stage}", {"stat": "Maximum", "label": "Visible"}]
                  ],
                  "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
                }
              },
              {
                "type": "metric", "x": 0, "y": 6, "width": 8, "height": 6,
                "properties": {
                  "title": "DLQ – Messages (sollte 0 sein)",
                  "metrics": [
                    ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "mcbs-invoice-processing-dlq-${self:provider.stage}", {"stat": "Maximum", "label": "DLQ Visible", "color": "#d62728"}],
                    ["AWS/SQS", "NumberOfMessagesSent", "QueueName", "mcbs-invoice-processing-dlq-${self:provider.stage}", {"stat": "Sum", "label": "DLQ Sent", "color": "#ff7f0e"}]
                  ],
                  "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
                }
              },
              {
                "type": "metric", "x": 8, "y": 6, "width": 8, "height": 6,
                "properties": {
                  "title": "DLQ Processor – Invocations & Errors",
                  "metrics": [
                    ["AWS/Lambda", "Invocations", "FunctionName", "e-invoice-generator-${self:provider.stage}-processDLQ", {"stat": "Sum", "label": "Invocations"}],
                    ["AWS/Lambda", "Errors",       "FunctionName", "e-invoice-generator-${self:provider.stage}-processDLQ", {"stat": "Sum", "label": "Errors", "color": "#d62728"}]
                  ],
                  "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
                }
              },
              {
                "type": "metric", "x": 16, "y": 6, "width": 8, "height": 6,
                "properties": {
                  "title": "Lambda Throttles",
                  "metrics": [
                    ["AWS/Lambda", "Throttles", "FunctionName", "e-invoice-generator-${self:provider.stage}-createEInvoice", {"stat": "Sum", "label": "createEInvoice", "color": "#ff7f0e"}],
                    ["AWS/Lambda", "Throttles", "FunctionName", "e-invoice-generator-${self:provider.stage}-processDLQ",    {"stat": "Sum", "label": "processDLQ"}]
                  ],
                  "period": 300, "view": "timeSeries", "region": "${AWS::Region}"
                }
              }
            ]
          }

    # ==================== SSM Parameter ====================

    # SSM Parameter nur in Stages anlegen, die den Bucket selbst verwalten (dev / persönliche Stages).
    # staging + production: Parameter werden außerhalb zusammen mit dem S3 Bucket über IaC bereitgestellt.
    BucketNameParameter:
      Type: AWS::SSM::Parameter
      Condition: CreateBucket
      Properties:
        Name: /mcbs-invoices/${self:provider.stage}/bucket
        Value: ${self:custom.bucketName}
        Type: String
        Description: S3 Bucket Name für MCBS-Rechnungen (Stage ${self:provider.stage})

    XmlPrefixParameter:
      Type: AWS::SSM::Parameter
      Condition: CreateBucket
      Properties:
        Name: /mcbs-invoices/${self:provider.stage}/mcbs-invoice-xml-prefix
        Value: ${self:custom.prefixes.xml}
        Type: String
        Description: S3-Prefix für eingehende MCBS-XML-Rechnungen

    PdfPrefixParameter:
      Type: AWS::SSM::Parameter
      Condition: CreateBucket
      Properties:
        Name: /mcbs-invoices/${self:provider.stage}/mcbs-invoice-pdf-prefix
        Value: ${self:custom.prefixes.pdf}
        Type: String
        Description: S3-Prefix für eingehende Kunden-PDFs

    OutputPrefixParameter:
      Type: AWS::SSM::Parameter
      Condition: CreateBucket
      Properties:
        Name: /mcbs-invoices/${self:provider.stage}/mcbs-invoice-output-prefix
        Value: ${self:custom.prefixes.output}
        Type: String
        Description: S3-Prefix für generierte ZUGFeRD-E-Rechnungen

    # ==================== SNS ====================

    # Alert Topic für DLQ-Fehler und Lambda-Errors
    AlertTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-alerts-${self:provider.stage}
        DisplayName: E-Invoice Alert Notifications
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # SQS Queue Policy (allows EventBridge to send messages)
    InvoiceProcessingQueuePolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        Queues:
          - !Ref InvoiceProcessingQueue
        PolicyDocument:
          Statement:
            # Allow EventBridge to send messages
            - Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action:
                - sqs:SendMessage
              Resource: !GetAtt InvoiceProcessingQueue.Arn
              Condition:
                ArnEquals:
                  aws:SourceArn:
                    - !GetAtt S3EventsToSQSRule.Arn
                    - !GetAtt ActiveAdapterRule.Arn

  Outputs:
    S3BucketName:
      Condition: CreateBucket
      Description: S3 Bucket for MCBS Invoices (nur wenn vom Stack erstellt)
      Value: !Ref McbsInvoicesBucket
      Export:
        Name: ${self:service}-${self:provider.stage}-mcbs-invoices-bucket

    SQSQueueURL:
      Description: SQS Queue URL for Invoice Processing (Batching Layer)
      Value: !Ref InvoiceProcessingQueue
      Export:
        Name: ${self:service}-${self:provider.stage}-invoice-queue-url

    SQSQueueARN:
      Description: SQS Queue ARN
      Value: !GetAtt InvoiceProcessingQueue.Arn
      Export:
        Name: ${self:service}-${self:provider.stage}-invoice-queue-arn

    DLQQueueURL:
      Description: Dead Letter Queue URL
      Value: !Ref InvoiceProcessingDLQ
      Export:
        Name: ${self:service}-${self:provider.stage}-invoice-dlq-url

    LambdaFunctionARN:
      Description: Lambda Function ARN (Unified E-Invoice Processor)
      Value: !GetAtt CreateEInvoiceLambdaFunction.Arn
      Export:
        Name: ${self:service}-${self:provider.stage}-create-einvoice-lambda

    AlertTopicARN:
      Description: SNS Topic for Alerts
      Value: !Ref AlertTopic
      Export:
        Name: ${self:service}-${self:provider.stage}-alert-topic

    DashboardURL:
      Description: CloudWatch Dashboard URL
      Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${self:service}-${self:provider.stage}'
      Export:
        Name: ${self:service}-${self:provider.stage}-dashboard-url

# Plugins
plugins:
  - serverless-offline

# Build Configuration (Serverless Framework v4 built-in esbuild)
build:
  esbuild:
    bundle: true
    minify: true
    sourcemap: true
    target: node22
    platform: node
    external:
      - '@aws-sdk/*'

# Custom Configuration
custom:
  # Ein Bucket – Artefakte werden über Präfixe getrennt
  bucketName: mcbs-invoices-${self:provider.stage}

  # S3-Präfixe je Artefakttyp
  prefixes:
    xml: 'raw/xml/'           # Eingehende MCBS-XML
    pdf: 'raw/pdf/'           # Eingehende Kunden-PDFs
    output: 'e-invoices/'     # Generierte ZUGFeRD-E-Rechnungen

  # Stage-specific overrides
  stages:
    dev:
      logLevel: debug
      eInvoiceProfile: factur-x-en16931
      activeAdapter: custom.mcbs
      lambdaMemory: 2048
      lambdaTimeout: 60
      batchSize: 10
      maxBatchingWindow: 5
      s3RuleState: ENABLED       # S3 Events → MCBS Adapter
      activeRuleState: DISABLED  # Kein zweiter Adapter aktiv
      eventSource: custom.mcbs
      eventDetailType: Object Created
      createBucket: 'true'       # Bucket wird vom Stack erstellt (dev + persönliche Stages)

    staging:
      logLevel: info
      eInvoiceProfile: factur-x-en16931
      activeAdapter: custom.mcbs
      lambdaMemory: 2048
      lambdaTimeout: 60
      batchSize: 10
      maxBatchingWindow: 5
      s3RuleState: ENABLED
      activeRuleState: DISABLED
      eventSource: custom.mcbs
      eventDetailType: Object Created
      createBucket: 'false'      # Bucket extern verwaltet (IaC)

    production:
      logLevel: warn
      eInvoiceProfile: factur-x-en16931
      activeAdapter: custom.billing
      lambdaMemory: 2048
      lambdaTimeout: 60
      batchSize: 10
      maxBatchingWindow: 5
      reservedConcurrency: 200
      s3RuleState: DISABLED      # MCBS nicht aktiv in production
      activeRuleState: ENABLED   # Billing Adapter aktiv
      eventSource: custom.billing
      eventDetailType: Invoice Created
      createBucket: 'false'      # Bucket extern verwaltet (IaC)

# Package Configuration
package:
  individually: true
  patterns:
    - '!.git/**'
    - '!.github/**'
    - '!test/**'
    - '!coverage/**'
    - '!docs/**'
    - '!*.md'
    - '!node_modules/aws-sdk/**' # Already in Lambda runtime
